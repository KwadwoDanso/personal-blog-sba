<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Personal Blog</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="script.js" defer></script>
    
</head>

<body>

    <header>
        <h1>My Personal Blog</h1>
    </header>

    <main>

        <!-- Post Form used for both adding and editing -->
        <section aria-labelledby="form-heading">
            <h2 id="form-heading">New Post</h2>

            <form id="postForm" novalidate>

                <div class="form-group">
                    <label for="postTitle">Title</label>
                    <input type="text" id="postTitle" name="postTitle" required />
                    <span class="error-message" id="titleError"></span>
                </div>

                <div class="form-group">
                    <label for="postContent">Content</label>
                    <textarea id="postContent" name="postContent" rows="5" required></textarea>
                    <span class="error-message" id="contentError"></span>
                </div>

                <button type="submit" id="submitBtn">Add Post</button>
                <button type="button" id="cancelBtn" style="display:none;">Cancel</button>

            </form>
        </section>

        <!-- Post List -->
        <section aria-labelledby="posts-heading">
            <h2 id="posts-heading">Posts</h2>
            <div id="postList"></div>
        </section>

    </main>

   
</body>

</html>
